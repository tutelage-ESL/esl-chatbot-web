# Render Blueprint — backend API only. Frontend is deployed separately on Vercel
# (see backend/docs/handover/deployment-runbook.md).
#
# Usage: Render dashboard → New → Blueprint → point at this repo. Render reads this
# file, creates the service below, and prompts for every `sync: false` value once.
# Docker build has no --target, so it builds the LAST stage in backend/Dockerfile
# (the `production` stage) automatically.
services:
  - type: web
    name: tutelage-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # TEMP: free during initial setup/testing (no real users yet). Switch to `starter`
    # before launch — Free spins down after 15 min idle, which drops Socket.io
    # connections and breaks cron timing. Flip this line + redeploy when ready.
    plan: free
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000

      # ── Database / cache (Neon + Upstash — already provisioned, reuse existing) ──
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # ── JWT — generate fresh prod secrets, never reuse dev values ──
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES
        value: 7d

      # ── Frontend origin (set once the Vercel URL / custom domain is known) ──
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false

      # ── Google OAuth ──
      - key: GOOGLE_CLIENT_ID
        sync: false

      # ── Resend (email) ──
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

      # ── AI providers ──
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false

      # ── Cloudflare R2 (all five required together, else falls back to local disk) ──
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: tutelage-uploads
      - key: R2_PUBLIC_URL
        sync: false

      # ── FIB — leave unset until Task 6 (live creds require this app's public URL) ──
      - key: FIB_CLIENT_ID
        sync: false
      - key: FIB_CLIENT_SECRET
        sync: false
      - key: FIB_ENV
        value: stage
      - key: FIB_WEBHOOK_URL
        sync: false

      # ── Sentry (optional) ──
      - key: SENTRY_DSN
        sync: false
