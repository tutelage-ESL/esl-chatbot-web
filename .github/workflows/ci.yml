name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      # Dummy value — prisma generate and tsc only need DATABASE_URL to be a resolvable
      # string; no real connection is made during a type check.
      DATABASE_URL: postgresql://user:pass@localhost:5432/dummy

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: TypeScript type check
        run: bun run typecheck

  test:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: esl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # prisma.config.ts calls env("DATABASE_URL") at load time (even for `prisma generate`),
      # so it must be set. A dummy value is enough — no real connection is made during generation.
      # It must differ from TEST_DATABASE_URL so setup.ts's inequality guard passes, then
      # the preload overrides process.env.DATABASE_URL → TEST_DATABASE_URL before tests run.
      DATABASE_URL: postgresql://user:pass@localhost:5432/dummy
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/esl_test
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Set up test database
        run: bun run test:setup:env

      - name: Run tests
        run: bun run test:env
