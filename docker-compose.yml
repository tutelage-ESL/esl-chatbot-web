name: esl-chatbot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: esl_chatbot
    ports:
      - "5432:5432"          # remap to "5433:5432" if a local Postgres already uses 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: backend
      target: dev
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/esl_chatbot
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: docker-dev-access-secret
      JWT_REFRESH_SECRET: docker-dev-refresh-secret
      CORS_ORIGIN: http://localhost:3001
      # Set RESET_DB=true to wipe and reseed the database on startup (dev only).
      # Example: RESET_DB=true docker compose up
      RESET_DB: ${RESET_DB:-false}
      # Optional AI / email keys — put them in a root .env file next to docker-compose.yml
      # (compose auto-loads it) or export them in your shell before running compose.
      # Leaving them empty means those features return 503 or fall back to heuristics.
      #
      # ⚠ Do NOT add R2_*, SENTRY_DSN, FIB_WEBHOOK_URL, or SENDGRID_FROM_EMAIL here.
      # Those vars are validated with .url() / .email() in env.ts and an empty string
      # will fail Zod validation and crash the server on boot.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      # Mount only src/ and prisma/ for hot reload — keeps /app/node_modules intact
      # in the container (no node_modules shadowing problem).
      # Changes to package.json or tsconfig.json require: docker compose up --build
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      # Persist the local-disk upload fallback (avatars) across container restarts
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
