<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AI ESL Logo">
  <defs>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Transparent canvas (container has background) -->
  <rect width="64" height="64" rx="14" fill="none"/>

  <!-- Graduation cap (education) -->
  <path d="M32 12l22 10-22 10-22-10 22-10z" fill="url(#amberGrad)"/>
  <path d="M16 23v8c0 5.2 8.8 9.4 16 9.4s16-4.2 16-9.4v-8" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Tassel -->
  <path d="M48 23v8" stroke="#111827" stroke-width="2" stroke-linecap="round"/>

  <!-- Chat bubble (conversation) -->
