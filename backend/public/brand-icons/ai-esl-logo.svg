  <path d="M24 56l-6 6v-8" fill="#ffffff" stroke="#111827" stroke-width="2" stroke-linejoin="round"/>

  <!-- Robot face accents (AI) -->
  <circle cx="28" cy="45" r="3" fill="#111827"/>
  <circle cx="36" cy="45" r="3" fill="#111827"/>
  <rect x="30" y="48" width="4" height="2" rx="1" fill="#f59e0b"/>
</svg>